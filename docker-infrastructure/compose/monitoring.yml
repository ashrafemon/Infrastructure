# =============================================================================
# Monitoring Stack  (profile: production)
# =============================================================================
# Prometheus 3.5  |  Grafana 12.0  |  Loki 3.5  |  Promtail 3.5
#
# Starts only with: docker compose --profile production up -d
# =============================================================================

services:
  prometheus:
    profiles: ["production"]
    image: prom/prometheus:v3.5.0
    container_name: prometheus
    restart: unless-stopped
    networks:
      - monitoring_network
      - backend_network
    ports:
      - "9090:9090"
    environment:
      TZ: ${TZ:-UTC}
    volumes:
      - prometheus_data:/prometheus
      - ../configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    profiles: ["production"]
    image: grafana/grafana:12.0.2
    container_name: grafana
    restart: unless-stopped
    networks:
      - monitoring_network
      - backend_network
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:?err}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
      TZ: ${TZ:-UTC}
    volumes:
      - grafana_data:/var/lib/grafana
      - ../configs/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ../configs/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../configs/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  loki:
    profiles: ["production"]
    image: grafana/loki:3.5.0
    container_name: loki
    restart: unless-stopped
    networks:
      - monitoring_network
    environment:
      TZ: ${TZ:-UTC}
    volumes:
      - loki_data:/loki
      - ../configs/loki/loki.yml:/etc/loki/loki.yml:ro
    command:
      - "-config.file=/etc/loki/loki.yml"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  promtail:
    profiles: ["production"]
    image: grafana/promtail:3.5.0
    container_name: promtail
    restart: unless-stopped
    networks:
      - monitoring_network
    environment:
      TZ: ${TZ:-UTC}
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../configs/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
    command:
      - "-config.file=/etc/promtail/promtail.yml"
    depends_on:
      loki:
        condition: service_healthy
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9080/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"


