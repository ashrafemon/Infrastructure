# =============================================================================
# Security & Availability  (profile: production)
# =============================================================================
# CrowdSec 1.6  |  Uptime Kuma 1.23
#
# Starts only with: docker compose --profile production up -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # CrowdSec - Intrusion prevention engine
  # ---------------------------------------------------------------------------
  crowdsec:
    profiles: ["production"]
    image: crowdsecurity/crowdsec:v1.6.8
    container_name: crowdsec
    restart: unless-stopped
    networks:
      - frontend_network
      - backend_network
    environment:
      COLLECTIONS: "crowdsecurity/nginx crowdsecurity/linux crowdsecurity/http-cve"
      CUSTOM_HOSTNAME: ${HOSTNAME:-infra-host}
      ENROLL_INSTANCE_NAME: ${HOSTNAME:-infra-instance}
      ENROLL_KEY: ${CROWDSEC_ENROLL_KEY:-}
      TZ: ${TZ:-UTC}
    volumes:
      - crowdsec_config_data:/etc/crowdsec
      - crowdsec_log_data:/var/log/crowdsec
      - /var/log/nginx:/var/log/nginx:ro
      - /var/log/auth.log:/var/log/auth.log:ro
    healthcheck:
      test: ["CMD", "cscli", "metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Uptime Kuma - Monitoring dashboard
  # ---------------------------------------------------------------------------
  uptime-kuma:
    profiles: ["production"]
    image: louislam/uptime-kuma:2.4.0
    container_name: uptime-kuma
    restart: unless-stopped
    networks:
      - frontend_network
    ports:
      - "3001:3001"
    environment:
      TZ: ${TZ:-UTC}
    volumes:
      - uptime_kuma_data:/app/data
    healthcheck:
      test: ["CMD", "node", "server/server.js", "--health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
