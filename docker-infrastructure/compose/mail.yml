# =============================================================================
# Email Services
# =============================================================================
# Profile-based: choose one based on your environment.
#
#   docker compose --profile production up -d
#   docker compose --profile development up -d   # Mailpit (dev SMTP capture)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Mailpit - Development SMTP capture server
  # ---------------------------------------------------------------------------
  mailpit:
    profiles: ["development"]
    image: axllent/mailpit
    container_name: mailpit
    restart: unless-stopped
    networks:
      - mail_network
      - backend_network
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
      MP_MAX_MESSAGES: 5000
      MP_DATA_FILE: /data/mailpit.db
      MP_UI_UPLOAD_LIMIT: 50
      TZ: ${TZ:-UTC}
    volumes:
      - mailpit_data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8025/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
