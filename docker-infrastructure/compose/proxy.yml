# =============================================================================
# Reverse Proxy
# =============================================================================
# Nginx Proxy Manager 2.15.1 - SSL termination and reverse proxy
#
# Cloudflare SSL:
#   NPM supports Cloudflare DNS-01 challenge for wildcard certificates.
#   Configure via web UI at port 81 → SSL Certificates → Add → Let's Encrypt
#   Select DNS Challenge → Cloudflare and paste your API token.
#   See docs/cloudflare-ssl.md for full instructions.
# =============================================================================

services:
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:2.15.1
    container_name: nginx-proxy-manager
    restart: unless-stopped
    networks:
      - frontend_network
      - backend_network
    ports:
      - "80:80"
      - "127.0.0.1:81:81"
      - "443:443"
    environment:
      DB_SQLITE_FILE: /data/database.sqlite
      DISABLE_IPV6: "false"
      TZ: ${TZ:-UTC}
    volumes:
      - nginx_proxy_data:/data
      - nginx_proxy_ssl:/etc/letsencrypt
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:81/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
