# =============================================================================
# Database Management UI
# =============================================================================
# phpMyAdmin 5.2  |  pgAdmin 4  |  RedisInsight 2.70
# =============================================================================
# Access these UIs via SSH tunnel or Nginx Proxy Manager (SSL).
# Never expose management UIs directly to the internet.
# =============================================================================

services:
  phpmyadmin:
    image: phpmyadmin:5.2.2
    container_name: phpmyadmin
    restart: unless-stopped
    networks:
      - frontend_network
      - backend_network
    ports:
      - "8081:80"
    environment:
      PMA_HOST: ${PMA_HOST:-mysql}
      PMA_PORT: ${PMA_PORT:-3306}
      PMA_ARBITRARY: 1
      UPLOAD_LIMIT: ${UPLOAD_LIMIT:-256M}
      MEMORY_LIMIT: ${UPLOAD_LIMIT:-256M}
      MAX_EXECUTION_TIME: 300
      TZ: ${TZ:-UTC}
    depends_on:
      mysql:
        condition: service_healthy
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  pgadmin:
    image: dpage/pgadmin4:9.6
    container_name: pgadmin
    restart: unless-stopped
    networks:
      - frontend_network
      - backend_network
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:?err}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "True"
      TZ: ${TZ:-UTC}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redisinsight:
    image: redis/redisinsight:2.70.0
    container_name: redisinsight
    restart: unless-stopped
    networks:
      - frontend_network
      - backend_network
    ports:
      - "5540:5540"
    environment:
      TZ: ${TZ:-UTC}
    volumes:
      - redisinsight_data:/data
    depends_on:
      redis:
        condition: service_healthy
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5540/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
