# =============================================================================
# Database Services
# =============================================================================
# MySQL 8.0  |  PostgreSQL 18  |  MongoDB 8.0  |  Redis 7.4
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # MySQL 8.0.46 - Primary relational database
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.0.46
    container_name: mysql
    restart: unless-stopped
    networks:
      - backend_network
    ports:
      - "${DB_BIND_ADDRESS}3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?err}
      MYSQL_PWD: ${MYSQL_ROOT_PASSWORD:?err}
      REPLICATION_USER: ${REPLICATION_USER:-replicator}
      REPLICATION_PASSWORD: ${REPLICATION_PASSWORD:?err}
      TZ: ${TZ:-UTC}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./configs/mysql/conf.d/master.cnf:/etc/mysql/conf.d/master.cnf:ro
      - ./scripts/mysql/setup-replication.sh:/docker-entrypoint-initdb.d/setup-replication.sh:ro
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # MySQL Replica - Read-only replica for read scaling
  # ---------------------------------------------------------------------------
  mysql-replica:
    image: mysql:8.0.46
    container_name: mysql-replica
    restart: unless-stopped
    networks:
      - backend_network
    ports:
      - "${DB_BIND_ADDRESS}3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?err}
      MYSQL_PWD: ${MYSQL_ROOT_PASSWORD:?err}
      REPLICATION_USER: ${REPLICATION_USER:-replicator}
      REPLICATION_PASSWORD: ${REPLICATION_PASSWORD:?err}
      TZ: ${TZ:-UTC}
    volumes:
      - mysql_replica_data:/var/lib/mysql
      - ./configs/mysql/conf.d/replica.cnf:/etc/mysql/conf.d/replica.cnf:ro
      - ./scripts/mysql/init-replica.sh:/docker-entrypoint-initdb.d/init-replica.sh:ro
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD-SHELL", "mysql -u root -p'${MYSQL_ROOT_PASSWORD}' -e 'SHOW REPLICA STATUS\\G' 2>/dev/null | grep -q 'Replica_IO_Running: Yes' && mysqladmin ping -h localhost -u root"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # PostgreSQL 18.4 - Advanced relational database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:18.4
    container_name: postgres
    restart: unless-stopped
    networks:
      - backend_network
    ports:
      - "${DB_BIND_ADDRESS}5432:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?err}
      REPLICATION_USER: ${REPLICATION_USER:-replicator}
      REPLICATION_PASSWORD: ${REPLICATION_PASSWORD:?err}
      TZ: ${TZ:-UTC}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./configs/postgres/primary.conf:/etc/postgresql/conf.d/primary.conf:ro
      - ./configs/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./scripts/postgres/init-primary.sh:/docker-entrypoint-initdb.d/init-primary.sh:ro
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # PostgreSQL Replica - Hot standby for read scaling
  # ---------------------------------------------------------------------------
  postgres-replica:
    image: postgres:18.4
    container_name: postgres-replica
    restart: unless-stopped
    networks:
      - backend_network
    ports:
      - "${DB_BIND_ADDRESS}5433:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?err}
      REPLICATION_USER: ${REPLICATION_USER:-replicator}
      REPLICATION_PASSWORD: ${REPLICATION_PASSWORD:?err}
      TZ: ${TZ:-UTC}
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
      - ./scripts/postgres/init-standby.sh:/init-standby.sh:ro
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -c '
      if [ ! -f /var/lib/postgresql/data/standby.signal ]; then
        /init-standby.sh
      fi
      exec /usr/local/bin/docker-entrypoint.sh postgres
      '
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # MongoDB 8.0 - NoSQL document database
  # ---------------------------------------------------------------------------
  mongo:
    image: mongo:8.0.15
    container_name: mongo
    restart: unless-stopped
    networks:
      - backend_network
    ports:
      - "${DB_BIND_ADDRESS}27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:?err}
      TZ: ${TZ:-UTC}
    volumes:
      - mongo_data:/data/db
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand(\"ping\")' --username ${MONGO_INITDB_ROOT_USERNAME:-root} --password ${MONGO_INITDB_ROOT_PASSWORD:?err} --authenticationDatabase admin | grep -q '\"ok\" : 1'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Redis 7.4 - In-memory data structure store (cache, session, queue)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.4.5-alpine
    container_name: redis
    restart: unless-stopped
    networks:
      - backend_network
    ports:
      - "${DB_BIND_ADDRESS}6379:6379"
    volumes:
      - redis_data:/data
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD:?err}
      TZ: ${TZ:-UTC}
    command: >
      redis-server --appendonly yes
        --requirepass ${REDIS_PASSWORD:?err}
        --appendfsync everysec
        --auto-aof-rewrite-percentage 100
        --auto-aof-rewrite-min-size 64mb
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
