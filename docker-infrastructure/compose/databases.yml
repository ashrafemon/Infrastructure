# =============================================================================
# Database Services
# =============================================================================
# MySQL 8.0  |  PostgreSQL 18  |  MongoDB 8.0  |  Redis 7.4
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # MySQL 8.0.46 - Primary relational database
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.0.46
    container_name: mysql
    restart: unless-stopped
    networks:
      - backend_network
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?err}
      MYSQL_PWD: ${MYSQL_ROOT_PASSWORD:?err}
      TZ: ${TZ:-UTC}
    volumes:
      - mysql_data:/var/lib/mysql
      - ../configs/mysql/conf.d/master.cnf:/etc/mysql/conf.d/master.cnf:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -uroot -p${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # PostgreSQL 18.4 Primary
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:18.4
    container_name: postgres
    restart: unless-stopped
    networks:
      - backend_network
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?err}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      TZ: ${TZ:-UTC}
    command:
      - postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # MongoDB 8.0
  # ---------------------------------------------------------------------------
  mongo:
    image: mongo:8.0.15
    container_name: mongo
    restart: unless-stopped
    networks:
      - backend_network
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:?err}
      TZ: ${TZ:-UTC}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mongosh --quiet --eval ''db.adminCommand("ping")'' --username ${MONGO_INITDB_ROOT_USERNAME:-root} --password ${MONGO_INITDB_ROOT_PASSWORD} --authenticationDatabase admin | grep -q ''ok''',
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Redis 7.4
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.4.6-alpine
    container_name: redis
    restart: unless-stopped
    networks:
      - backend_network
    volumes:
      - redis_data:/data
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD:?err}
      TZ: ${TZ:-UTC}
    command: >
      redis-server
      --save 900 1
      --save 300 10
      --save 60 10000
      --requirepass ${REDIS_PASSWORD}
      --dbfilename dump.rdb
      --dir /data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
