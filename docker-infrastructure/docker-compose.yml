# =============================================================================
# Docker Infrastructure - Main Compose File
# =============================================================================
# This file stitches together all service stacks into a unified deployment.
# Each stack is defined in its own file under compose/ for maintainability.
#
# Usage:
#   docker compose up -d                    # Start all services
#   docker compose up -d databases          # Start only databases
#   docker compose down                     # Stop everything
#   docker compose ps                       # List running services
# =============================================================================

name: ${COMPOSE_PROJECT_NAME:-infrastructure}

include:
  - compose/databases.yml
  - compose/databases-ui.yml
  - compose/messaging.yml
  - compose/storage.yml
  - compose/mail.yml
  - compose/monitoring.yml
  - compose/proxy.yml
  - compose/security.yml
  - compose/management.yml
  - compose/cicd.yml

networks:
  frontend_network:
    name: frontend_network
    driver: bridge
    attachable: true
    external: false

  backend_network:
    name: backend_network
    driver: bridge
    internal: ${PRODUCTION:-false}
    attachable: true
    external: false

  monitoring_network:
    name: monitoring_network
    driver: bridge
    attachable: true
    external: false

  mail_network:
    name: mail_network
    driver: bridge
    attachable: true
    external: false

volumes:
  mysql_data:
    name: mysql_data
    external: false
  postgres_data:
    name: postgres_data
    external: false
  mongo_data:
